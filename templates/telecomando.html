<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body{user-select:none;-webkit-user-select:none;background:#050515;color:#eee;touch-action:manipulation;font-family:sans-serif;min-height:100vh;overflow-y:auto;overflow-x:hidden;padding-bottom:20px}
        button:active{transform:scale(0.97);filter:brightness(0.9)}
        .ctrl-btn{width:18%;height:50px;background:#222;border:1px solid #444;border-radius:4px;font-weight:bold;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 #111;color:white}
        .text-red{color:#f55}.text-green{color:#5f5}
        .score-bar{background:black;color:white;display:flex;justify-content:space-between;padding:0 20px;font-size:3rem;font-weight:bold;line-height:1.2;margin:5px 0;border-radius:2px;position:relative;border:1px solid #333}
        .score-val{width:45%;text-align:center}
        .prio-dot{width:15px;height:15px;border-radius:50%;background:#222;position:absolute;top:15px;border:1px solid #444;opacity:0.3}
        .prio-l{left:10px}.prio-r{right:10px}
        .prio-active{background:white;box-shadow:0 0 10px white;opacity:1}
        .start-btn{width:100%;min-height:20vh;padding:20px 0;font-size:4rem;font-weight:bold;color:white;border:none;display:flex;align-items:center;justify-content:center;margin:5px 0;border-radius:4px; transition: background-color 0.1s;}
        .bg-start{background:#008800}.bg-stop{background:#cc0000}.bg-pause{background:#eab308;color:black}
        
        .bottom-grid{display:grid;grid-template-columns:1fr 2fr 1fr;gap:4px;margin-bottom:20px}
        .side-col{display:flex;flex-direction:column;gap:4px}.center-col{display:flex;flex-direction:column;gap:4px}
        .card-btn{min-height:60px;border-radius:4px;border:1px solid #444;font-weight:bold;font-size:0.9rem;display:flex;align-items:center;justify-content:center;background:#222;box-shadow:0 1px 0 #111;color:#ccc}
        .card-btn.active{border:2px solid white;color:white}
        .bg-y{background:#554400;color:#ffd}.bg-r{background:#550000;color:#fdd}.bg-b{background:#111;color:#888}
        .bg-p-active{background:#e65100;color:white;border:2px solid white}
        details>summary{list-style:none;cursor:pointer;background:#222;padding:10px;text-align:center;border-radius:4px;font-weight:bold;border:1px solid #444;margin-bottom:2px;color:#ccc}
        details>summary::-webkit-details-marker{display:none}
        .sys-btn{background:#222;border:1px solid #444;width:100%;padding:10px;margin-bottom:2px;font-weight:bold;border-radius:4px;color:#ccc}
        .timer-text-break{color:#facc15}
        
        #timer-display{font-size:1.5rem;padding:15px}
    </style>
</head>
<body class="flex flex-col min-h-screen p-2 overflow-y-auto overflow-x-hidden">
    
    <div class="flex justify-between items-center mb-1 flex-shrink-0">
        <details class="flex-grow accord">
            <summary id="timer-display">Modifica Tempo (3:00)</summary>
            <div class="grid grid-cols-4 gap-1 p-2 bg-gray-800 rounded">
                <button class="sys-btn" onclick="adjustTime(60)">+1m</button>
                <button class="sys-btn" onclick="adjustTime(-60)">-1m</button>
                <button class="sys-btn" onclick="adjustTime(1)">+1s</button>
                <button class="sys-btn" onclick="adjustTime(-1)">-1s</button>
            </div>
        </details>
    </div>

    <div class="flex justify-between gap-1 flex-shrink-0">
        <button class="ctrl-btn text-red" onclick="scoreOptimistic('left',-1)">-</button>
        <button class="ctrl-btn text-green" onclick="scoreOptimistic('left',1)">+</button>
        <button class="ctrl-btn text-sm" style="width:22%" onclick="doubleHitOptimistic()">DOPPIO</button>
        <button class="ctrl-btn text-green" onclick="scoreOptimistic('right',1)">+</button>
        <button class="ctrl-btn text-red" onclick="scoreOptimistic('right',-1)">-</button>
    </div>
    
    <div class="score-bar flex-shrink-0">
        <div id="prio-l" class="prio-dot prio-l"></div>
        <div id="s-l" class="score-val text-red-500">0</div>
        <div id="s-r" class="score-val text-green-500">0</div>
        <div id="prio-r" class="prio-dot prio-r"></div>
    </div>
    
    <button id="btn-toggle" onclick="toggleTimerOptimistic()" class="start-btn bg-start flex-shrink-0">AVVIO</button>
    
    <div class="bottom-grid flex-grow">
        <div class="side-col">
            <button class="card-btn bg-y" id="btn-l-Y" onclick="handleCardClick('left','Y')">G</button>
            <button class="card-btn bg-r" id="btn-l-R" onclick="handleCardClick('left','R')">R</button>
        </div>
        <div class="center-col pb-1">
            <div class="flex flex-col mt-1">
                <button class="sys-btn text-red-300 bg-red-900" onclick="if(confirm('Reset TOTALE?'))resetAction('reset_all')">Reset TUTTO</button>
                <button class="sys-btn text-yellow-300" onclick="resetAction('reset_timer')">Reset Tempo</button>
            </div>
        </div>
        <div class="side-col">
            <button class="card-btn bg-y" id="btn-r-Y" onclick="handleCardClick('right','Y')">G</button>
            <button class="card-btn bg-r" id="btn-r-R" onclick="handleCardClick('right','R')">R</button>
        </div>
    </div>

    <script>
        const socket=io();
        
        // --- LOGICA OTTIMISTICA ZERO-LAG ---
        // Aggiorna lo schermo del telefono PRIMA ancora di ricevere la risposta dal server
        
        function forceTimerStopLocally() {
            const b = document.getElementById('btn-toggle');
            b.innerText = "AVVIO";
            b.className = "start-btn bg-start";
        }

        function scoreOptimistic(side, delta) {
            // Aggiorna visivamente il numero subito
            const el = document.getElementById(side === 'left' ? 's-l' : 's-r');
            let val = parseInt(el.innerText);
            val = Math.max(0, val + delta);
            el.innerText = val;
            
            // Qualsiasi cambio punteggio ferma il tempo!
            forceTimerStopLocally();
            
            // Invia al server in background
            socket.emit('update_score', {side: side, delta: delta});
            if(navigator.vibrate) navigator.vibrate(50);
        }
        
        function doubleHitOptimistic() {
            document.getElementById('s-l').innerText = parseInt(document.getElementById('s-l').innerText) + 1;
            document.getElementById('s-r').innerText = parseInt(document.getElementById('s-r').innerText) + 1;
            forceTimerStopLocally();
            socket.emit('double_hit');
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function toggleTimerOptimistic() {
            const b = document.getElementById('btn-toggle');
            if (b.innerText === "AVVIO") {
                b.innerText = "STOP";
                b.className = "start-btn bg-stop";
            } else {
                b.innerText = "AVVIO";
                b.className = "start-btn bg-start";
            }
            socket.emit('toggle_timer');
        }

        socket.on('state_update',s=>{
            // Conferma dati dal server
            document.getElementById('s-l').innerText=s.fencer_left.score;
            document.getElementById('s-r').innerText=s.fencer_right.score;
            
            const b=document.getElementById('btn-toggle');
            if(s.running){b.innerText="STOP";b.className="start-btn bg-stop"}
            else{b.innerText="AVVIO";b.className="start-btn bg-start"}
            
            const upC=(side,d)=>{
                const sc=side[0];
                ['Y','R','B'].forEach(c=>{
                    let el = document.getElementById(`btn-${sc}-${c}`);
                    if(el) el.classList.remove('active');
                });
                if(d.cards.Y) { let el = document.getElementById(`btn-${sc}-Y`); if(el) el.classList.add('active'); }
                if(d.cards.R) { let el = document.getElementById(`btn-${sc}-R`); if(el) el.classList.add('active'); }
            };
            upC('left',s.fencer_left); upC('right',s.fencer_right);
        });

        socket.on('timer_update',d=>{
            const ts=`${Math.floor(d.time/60)}:${(Math.floor(d.time%60)<10?'0':'')+Math.floor(d.time%60)}`;
            document.getElementById('timer-display').innerText=`Modifica Tempo (${ts})`;
        });

        function adjustTime(d){ socket.emit('adjust_time',{delta:d}); forceTimerStopLocally(); }
        function resetAction(a){ socket.emit(a); }
        function handleCardClick(s,c){ 
            socket.emit('card_action',{side:s,card:c}); 
            forceTimerStopLocally(); // Assegnare un cartellino ferma il tempo
        }
        
        setInterval(()=>socket.emit('admin_heartbeat',{active:True}), 2000);
    </script>
</body>
</html>

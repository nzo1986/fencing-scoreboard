<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telecomando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; touch-action: manipulation; user-select: none; font-family: sans-serif; overflow: hidden; }
        .border-custom { border: 1px solid #333; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Top Bar -->
    <div class="bg-[#1f1f1f] py-3 text-center border-b border-[#333]" onclick="promptTime()">
        <span class="text-white font-bold text-lg">Modifica Tempo (<span id="timer-display-top">3:00</span>)</span>
    </div>

    <!-- +/- Row -->
    <div class="flex w-full bg-[#111] border-b border-[#333]">
        <button class="flex-1 py-4 text-red-500 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('update_score', {side:'left', delta:-1})">-</button>
        <button class="flex-1 py-4 text-green-500 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('update_score', {side:'left', delta:1})">+</button>
        <button class="flex-[2] py-4 text-gray-300 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('double_hit')">DOPPIO</button>
        <button class="flex-1 py-4 text-green-500 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('update_score', {side:'right', delta:1})">+</button>
        <button class="flex-1 py-4 text-red-500 font-bold active:bg-[#222]" onclick="socket.emit('update_score', {side:'right', delta:-1})">-</button>
    </div>

    <!-- Scores -->
    <div class="flex w-full bg-[#050505] py-6">
        <div class="flex-1 text-center text-red-500 text-6xl font-bold" id="score-left">0</div>
        <div class="flex-1 text-center text-green-500 text-6xl font-bold" id="score-right">0</div>
    </div>

    <!-- AVVIO Button -->
    <div class="w-full px-2 py-2">
        <button id="btn-avvio" class="w-full bg-[#16a34a] text-white text-5xl font-bold py-8 rounded shadow-lg active:opacity-75 transition-colors" onclick="socket.emit('toggle_timer')">AVVIO</button>
    </div>

    <!-- Grid Controls -->
    <div class="w-full px-2 pb-2 flex-1 flex flex-col gap-2 justify-center">
        
        <!-- Row P / Priorità / INVIA / P -->
        <div class="flex gap-2">
            <button class="flex-1 bg-[#333] text-gray-300 font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('card_action', {side:'left', card:'P_Y'})">P</button>
            <button class="flex-[2] bg-[#1e3a8a] text-white font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('toggle_priority')">Priorità</button>
            <button class="flex-[2] bg-[#1d4ed8] text-white font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('send_result')">INVIA</button>
            <button class="flex-1 bg-[#333] text-gray-300 font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('card_action', {side:'right', card:'P_Y'})">P</button>
        </div>

        <!-- Row G / Swipe / G -->
        <div class="flex gap-2">
            <button class="flex-1 bg-[#ca8a04] text-black font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('card_action', {side:'left', card:'Y'})">G</button>
            <button class="flex-[4] bg-[#7f1d1d] text-white font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('swap_fencers')">Swipe Atleti &lt;--&gt;</button>
            <button class="flex-1 bg-[#ca8a04] text-black font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('card_action', {side:'right', card:'Y'})">G</button>
        </div>

        <!-- Row R / Menu Reset / R -->
        <div class="flex gap-2">
            <button class="flex-1 bg-[#dc2626] text-white font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('card_action', {side:'left', card:'R'})">R</button>
            <button class="flex-[4] bg-[#27272a] text-white font-bold py-4 rounded border-custom active:opacity-70" onclick="document.getElementById('menu-reset').classList.toggle('hidden')">Menu Reset</button>
            <button class="flex-1 bg-[#dc2626] text-white font-bold py-4 rounded border-custom active:opacity-70" onclick="socket.emit('card_action', {side:'right', card:'R'})">R</button>
        </div>

        <!-- Hidden Reset Menu (COL RESET DEI CARTELLINI) -->
        <div id="menu-reset" class="hidden grid grid-cols-2 gap-2 bg-[#18181b] p-3 rounded border border-[#444] shadow-inner mb-1">
            <button class="bg-[#333] text-white py-3 rounded font-bold active:bg-[#555]" onclick="socket.emit('reset_scores')">Azzera Punti</button>
            <button class="bg-[#333] text-white py-3 rounded font-bold active:bg-[#555]" onclick="socket.emit('reset_timer')">Azzera Tempo</button>
            <button class="bg-[#222] text-white py-3 rounded font-bold col-span-2 border border-[#444] active:bg-[#444]" onclick="socket.emit('reset_all')">Reset Totale</button>
            <button class="bg-[#3f1f1f] text-red-300 py-3 rounded font-bold text-sm border border-[#5c2b2b] active:bg-[#5c2b2b]" onclick="socket.emit('reset_cards', {side:'left'})">Reset Cart. SX</button>
            <button class="bg-[#1b3b22] text-green-300 py-3 rounded font-bold text-sm border border-[#2b5c35] active:bg-[#2b5c35]" onclick="socket.emit('reset_cards', {side:'right'})">Reset Cart. DX</button>
        </div>

        <!-- Row N / Girone / N -->
        <div class="flex gap-2">
            <button class="flex-1 bg-[#000] text-white font-bold py-4 rounded border-custom active:bg-[#222]" onclick="socket.emit('card_action', {side:'left', card:'B'})">N</button>
            <button class="flex-[4] bg-[#27272a] text-white font-bold py-4 rounded border-custom active:opacity-70" id="btn-girone" onclick="cycleGirone()">Girone: Rosso</button>
            <button class="flex-1 bg-[#000] text-white font-bold py-4 rounded border-custom active:bg-[#222]" onclick="socket.emit('card_action', {side:'right', card:'B'})">N</button>
        </div>

        <!-- Row Select / AGG -->
        <div class="flex gap-2">
            <select id="match-select" class="flex-[4] bg-[#18181b] text-white border-custom rounded px-3 py-4 outline-none text-center font-bold text-lg" onchange="loadSelectedMatch()">
                <option value="">Seleziona Assalto...</option>
            </select>
            <!-- Il bottone AGG ora richiede l'aggiornamento della cache a Google -->
            <button class="flex-[1] bg-[#15803d] text-white font-bold py-4 rounded border border-[#166534] active:opacity-70" onclick="socket.emit('fetch_sheet')">AGG.</button>
        </div>

    </div>

    <!-- Bottom Nav Bar con pulsanti espliciti richiesti -->
    <div class="flex gap-2 p-3 bg-[#111] border-t border-[#333] mt-auto">
        <button class="flex-[2] bg-indigo-700 text-white font-bold py-3 text-sm rounded shadow active:bg-indigo-600" onclick="window.location.href='/inserisci_punti'">📝 Altri Gironi</button>
        <button class="flex-1 bg-gray-700 text-white font-bold py-3 text-sm rounded shadow active:bg-gray-600" onclick="window.location.href='/settings'">⚙️ Impost.</button>
    </div>

    <script>
        const socket = io();
        let allGironi = {};
        let currentGironeIdx = 0;
        const gironiList = ['rosso', 'giallo', 'blu', 'verde', '32'];

        // Sincronizza i dati all'avvio
        socket.on('connect', () => {
            socket.emit('fetch_sheet');
        });

        // Loop di aggiornamento automatico ogni 40 secondi
        setInterval(() => {
            socket.emit('fetch_sheet');
        }, 40000);

        function promptTime() {
            const t = prompt("Aggiungi o togli secondi dal tempo attuale (es. 10 o -10):", "0");
            if(t && !isNaN(t)) {
                socket.emit('adjust_time', {delta: parseInt(t)});
            }
        }

        function cycleGirone() {
            currentGironeIdx = (currentGironeIdx + 1) % gironiList.length;
            const g = gironiList[currentGironeIdx];
            document.getElementById('btn-girone').innerText = "Girone: " + g.charAt(0).toUpperCase() + g.slice(1);
            updateMatchDropdown();
            // Quando cambi girone forzi un aggiornamento immediato da Google Sheets
            socket.emit('fetch_sheet'); 
        }

        function updateMatchDropdown() {
            const g = gironiList[currentGironeIdx];
            const matches = allGironi[g] || [];
            const sel = document.getElementById('match-select');
            
            // Mantiene il primo placeholder
            sel.innerHTML = '<option value="">Seleziona Assalto...</option>';
            matches.forEach(m => {
                // Filtra solo gli atleti validi (non vuoti)
                if(m.sx && m.dx && m.sx.trim() !== '' && m.dx.trim() !== '') {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify({girone: g, row: m.row, sx: m.sx, dx: m.dx, p_sx: m.p_sx, p_dx: m.p_dx});
                    opt.innerText = `${m.sx} vs ${m.dx}`;
                    sel.appendChild(opt);
                }
            });
        }

        // Carica l'assalto appena viene selezionato dalla tendina
        function loadSelectedMatch() {
            const val = document.getElementById('match-select').value;
            if(val) {
                const data = JSON.parse(val);
                socket.emit('load_match', data);
                // Resetta la tendina per permettere una nuova selezione in futuro
                document.getElementById('match-select').value = "";
            }
        }

        socket.on('gironi_cache_update', cache => {
            allGironi = cache;
            updateMatchDropdown();
        });

        socket.on('timer_update', d => {
            const timeStr = d.time > 10 ? `${Math.floor(d.time/60)}:${(Math.floor(d.time%60)<10?'0':'')+Math.floor(d.time%60)}` : d.time.toFixed(1);
            document.getElementById('timer-display-top').innerText = timeStr;
        });

        socket.on('state_update', s => {
            // Punteggi
            document.getElementById('score-left').innerText = s.fencer_left.score;
            document.getElementById('score-right').innerText = s.fencer_right.score;

            // Stato AVVIO / ALT
            const btnAvvio = document.getElementById('btn-avvio');
            if(s.running) {
                btnAvvio.innerText = "ALT";
                btnAvvio.classList.remove('bg-[#16a34a]');
                btnAvvio.classList.add('bg-[#dc2626]');
            } else {
                btnAvvio.innerText = "AVVIO";
                btnAvvio.classList.remove('bg-[#dc2626]');
                btnAvvio.classList.add('bg-[#16a34a]');
            }

            // Sincronizza il girone attivo se settato dal server
            if (s.active_girone) {
                const idx = gironiList.indexOf(s.active_girone);
                if (idx !== -1 && currentGironeIdx !== idx) {
                    currentGironeIdx = idx;
                    document.getElementById('btn-girone').innerText = "Girone: " + s.active_girone.charAt(0).toUpperCase() + s.active_girone.slice(1);
                    updateMatchDropdown();
                }
            }
        });

        socket.on('action_feedback', d => {
            alert(d.msg);
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body{user-select:none;-webkit-user-select:none;background:#050515;color:#eee;touch-action:manipulation;font-family:sans-serif;min-height:100vh;overflow-y:auto;overflow-x:hidden;padding-bottom:10px}
        button:active{transform:scale(0.97);filter:brightness(0.9)}
        .ctrl-btn{width:18%;height:50px;background:#222;border:1px solid #444;border-radius:4px;font-weight:bold;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 #111;color:white}
        .text-red{color:#f55}.text-green{color:#5f5}
        .score-bar{background:black;color:white;display:flex;justify-content:space-between;padding:0 20px;font-size:3rem;font-weight:bold;line-height:1.2;margin:5px 0;border-radius:2px;position:relative;border:1px solid #333}
        .score-val{width:45%;text-align:center}
        .start-btn{width:100%;min-height:20vh;padding:20px 0;font-size:4rem;font-weight:bold;color:white;border:none;display:flex;align-items:center;justify-content:center;margin:5px 0;border-radius:4px}
        .bg-start{background:#008800}.bg-stop{background:#cc0000}.bg-pause{background:#eab308;color:black}
        
        .bottom-grid{display:grid;grid-template-columns:1fr 2fr 1fr;gap:4px;margin-bottom:15px}
        .side-col{display:flex;flex-direction:column;gap:4px}.center-col{display:flex;flex-direction:column;gap:4px}
        .card-btn{min-height:60px;border-radius:4px;border:1px solid #444;font-weight:bold;font-size:0.9rem;display:flex;align-items:center;justify-content:center;background:#222;box-shadow:0 1px 0 #111;color:#ccc}
        .card-btn.active{border:2px solid white;color:white}
        .bg-y{background:#554400;color:#ffd}.bg-r{background:#550000;color:#fdd}.bg-b{background:#111;color:#888}
        .bg-p-active{background:#e65100;color:white;border:2px solid white}
        details>summary{list-style:none;cursor:pointer;background:#222;padding:10px;text-align:center;border-radius:4px;font-weight:bold;border:1px solid #444;margin-bottom:2px;color:#ccc}
        details>summary::-webkit-details-marker{display:none}
        .sys-btn{background:#222;border:1px solid #444;width:100%;padding:10px;margin-bottom:2px;font-weight:bold;border-radius:4px;color:#ccc}
        .timer-text-break{color:#facc15}
        
        .prio-dot{width:15px;height:15px;border-radius:50%;background:#222;position:absolute;bottom:10px;border:1px solid #444;opacity:0.3}
        .prio-l{left:25px}.prio-r{right:25px}
        .prio-active{background:white;box-shadow:0 0 10px white;opacity:1}

        .bottom-controls{ display:flex; justify-content:space-between; align-items:center; gap:8px; background:rgba(30,30,30,0.8); padding:8px 15px; border-radius:30px; border:1px solid #444; width:100%; max-width:400px; margin:auto auto 0 auto; }
        .icon-btn { font-size: 1.4rem; text-decoration: none; filter: grayscale(100%) opacity(0.5); transition: 0.3s; display:flex; align-items:center; justify-content:center;}
        .icon-ok { filter: grayscale(0%) opacity(1); }
        .icon-error { filter: grayscale(0%) opacity(1) hue-rotate(150deg); }
        .gear-btn{ background:transparent; border:none; font-size:1.6rem; color:#ccc; padding:0; display:flex; align-items:center; justify-content:center;}
        
        .sensor-status { width: 38px; height: 38px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: white; border: 2px solid #555; transition: all 0.3s; }
        .sensor-active-red { background: #ef4444; box-shadow: 0 0 10px #ef4444; border-color: #fff; }
        .sensor-active-green { background: #22c55e; box-shadow: 0 0 10px #22c55e; border-color: #fff; }
        
        #toast-container{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:white;padding:20px 40px;border-radius:12px;font-size:1.5rem;text-align:center;z-index:9999;display:none;box-shadow:0 0 20px rgba(0,0,0,0.5);border:2px solid #555}
        #timer-display{font-size:1.5rem;padding:15px}
        .swipe-btn { color: #ff4444; font-weight: bold; background: #220000; border: 2px solid #550000; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-2 overflow-y-auto overflow-x-hidden">
    
    <div id="toast-container"></div>
    
    <div class="flex justify-between items-center mb-1 flex-shrink-0">
        <details class="flex-grow accord">
            <summary id="timer-display">Modifica Tempo (3:00)</summary>
            <div class="grid grid-cols-4 gap-1 p-2 bg-gray-800 rounded"><button class="sys-btn" onclick="adjustTime(60)">+1m</button><button class="sys-btn" onclick="adjustTime(-60)">-1m</button><button class="sys-btn" onclick="adjustTime(1)">+1s</button><button class="sys-btn" onclick="adjustTime(-1)">-1s</button></div>
        </details>
    </div>

    <div class="flex justify-between gap-1 flex-shrink-0"><button class="ctrl-btn text-red" onclick="scoreOptimistic('left',-1)">-</button><button class="ctrl-btn text-green" onclick="scoreOptimistic('left',1)">+</button><button class="ctrl-btn text-sm" style="width:22%" onclick="doubleHitOptimistic()">DOPPIO</button><button class="ctrl-btn text-green" onclick="scoreOptimistic('right',1)">+</button><button class="ctrl-btn text-red" onclick="scoreOptimistic('right',-1)">-</button></div>
    
    <div class="score-bar flex-shrink-0">
        <div id="prio-l" class="prio-dot prio-l"></div>
        <div id="s-l" class="score-val text-red-500">0</div>
        <div id="s-r" class="score-val text-green-500">0</div>
        <div id="prio-r" class="prio-dot prio-r"></div>
    </div>
    
    <button id="btn-toggle" onclick="toggleTimerOptimistic()" class="start-btn bg-start flex-shrink-0">AVVIO</button>
    
    <div class="bottom-grid flex-grow">
        <div class="side-col">
            <button class="card-btn" id="btn-l-P" onclick="toggleP('left')">P</button>
            <button class="card-btn bg-y" id="btn-l-Y" onclick="handleCardClick('left','Y')">G</button>
            <button class="card-btn bg-r" id="btn-l-R" onclick="handleCardClick('left','R')">R</button>
            <button class="card-btn bg-b" id="btn-l-B" onclick="handleCardClick('left','B')">N</button>
        </div>
        <div class="center-col pb-1">
            <div class="flex gap-1">
                <button class="sys-btn bg-gray-800 border-2 border-gray-600 text-white flex-1 py-4" onclick="socket.emit('toggle_priority')">Priorità</button>
                <button class="sys-btn bg-blue-900 border-2 border-blue-600 text-white flex-1 py-4" onclick="sendResult()">INVIA</button>
            </div>
            <div class="mt-1 mb-1">
                <button class="sys-btn swipe-btn w-full py-4" onclick="socket.emit('swap_fencers')">Swipe Atleti &lt;--&gt;</button>
            </div>
            <div class="flex flex-col mt-1">
                <details id="reset-menu" class="accord">
                    <summary>Menu Reset</summary>
                    <div class="flex flex-col bg-gray-800 p-2 rounded">
                        <button class="sys-btn text-gray-200 bg-gray-700 mb-4" onclick="undoAction()">&#x21BA; UNDO (Annulla)</button>
                        <button class="sys-btn text-blue-300" onclick="resetAction('reset_scores')">Reset Punti</button>
                        <button class="sys-btn text-yellow-300" onclick="resetAction('reset_timer')">Reset Tempo</button>
                        <button class="sys-btn text-red-300 bg-red-900" onclick="if(confirm('Reset TOTALE?'))resetAction('reset_all')">Reset TUTTO</button>
                    </div>
                </details>
                <details class="mt-1 accord" id="girone-details">
                    <summary id="girone-label">Girone: Rosso</summary>
                    <div class="flex flex-col bg-gray-800 p-2 rounded">
                        <button class="sys-btn text-red-400" onclick="changeGirone('rosso')">Rosso</button>
                        <button class="sys-btn text-yellow-400" onclick="changeGirone('giallo')">Giallo</button>
                        <button class="sys-btn text-blue-400" onclick="changeGirone('blu')">Blu</button>
                        <button class="sys-btn text-green-400" onclick="changeGirone('verde')">Verde</button>
                        <button class="sys-btn text-white" onclick="changeGirone('32')">Elim. 32</button>
                    </div>
                </details>
                <div class="flex mt-1 gap-1 h-14">
                    <select id="sel" class="flex-grow bg-gray-800 text-white border border-gray-600 rounded text-sm px-2" onchange="triggerMatchLoad()"></select>
                    <button onclick="forceUpdate()" class="bg-green-700 text-white px-3 rounded text-sm border border-green-600 font-bold">AGG.</button>
                </div>
            </div>
        </div>
        <div class="side-col">
            <button class="card-btn" id="btn-r-P" onclick="toggleP('right')">P</button>
            <button class="card-btn bg-y" id="btn-r-Y" onclick="handleCardClick('right','Y')">G</button>
            <button class="card-btn bg-r" id="btn-r-R" onclick="handleCardClick('right','R')">R</button>
            <button class="card-btn bg-b" id="btn-r-B" onclick="handleCardClick('right','B')">N</button>
        </div>
    </div>
    
    <div class="bottom-controls flex-shrink-0">
        <span id="stat-wifi" class="icon-btn" title="Internet">📡</span>
        <div id="stat-pico-r" class="sensor-status" title="Pico Rosso">--</div>
        <button onclick="window.location.href='/settings'" class="gear-btn" title="Impostazioni">⚙️</button>
        <div id="stat-pico-v" class="sensor-status" title="Pico Verde">--</div>
        <span id="stat-google" class="icon-btn" title="Google Sheets">☁️</span>
    </div>

    <script>
        const socket=io();
        let matches=[];
        let pMode={left:false,right:false};
        let currentGirone='rosso';
        let globalSettings = {}; 
        let audioUnlocked = false; 
        
        setInterval(() => {
            fetch('/api/pico_status')
                .then(r => r.json())
                .then(s => {
                    const pr = document.getElementById('stat-pico-r');
                    const pv = document.getElementById('stat-pico-v');
                    if(s.rosso.active) {
                        pr.className = 'sensor-status sensor-active-red';
                        pr.innerText = s.rosso.bat + '%';
                    } else { pr.className = 'sensor-status'; pr.innerText = '--'; }
                    
                    if(s.verde.active) {
                        pv.className = 'sensor-status sensor-active-green';
                        pv.innerText = s.verde.bat + '%';
                    } else { pv.className = 'sensor-status'; pv.innerText = '--'; }
                });
        }, 1500);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function unlockAudio() { if (!audioUnlocked && audioCtx.state !== 'running') audioCtx.resume().then(() => audioUnlocked = true); }
        document.body.addEventListener('touchstart', unlockAudio, {once:true});
        document.body.addEventListener('click', unlockAudio, {once:true});
        
        socket.on('hw_hit', data => { if (navigator.vibrate) navigator.vibrate(50); });

        function playBeep() {
            const volume = parseFloat(globalSettings.buzzer_volume || 1.0);
            if (volume <= 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); 
            const gain = audioCtx.createGain();
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            gain.gain.value = volume;
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.start(); 
            osc.stop(audioCtx.currentTime + 2.0); 
        }

        const accords = document.querySelectorAll('.accord');
        accords.forEach(acc => {
            acc.addEventListener('toggle', (e) => {
                if (acc.open) {
                    accords.forEach(other => { if (other !== acc && other.open) other.removeAttribute('open'); });
                    setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 50);
                }
            });
        });

        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast-container');
            t.innerText = msg; t.style.display = 'block';
            if(window.toastTimeout) clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => { t.style.display = 'none'; }, duration);
        }
        
        function forceTimerStopLocally() {
            const b = document.getElementById('btn-toggle');
            b.innerText = "AVVIO"; b.className = "start-btn bg-start";
        }
        function scoreOptimistic(side, delta) {
            const el = document.getElementById(side === 'left' ? 's-l' : 's-r');
            el.innerText = Math.max(0, parseInt(el.innerText) + delta);
            forceTimerStopLocally();
            socket.emit('update_score',{side:side,delta:delta});
            if(navigator.vibrate) navigator.vibrate(50);
        }
        function doubleHitOptimistic() {
            document.getElementById('s-l').innerText = parseInt(document.getElementById('s-l').innerText) + 1;
            document.getElementById('s-r').innerText = parseInt(document.getElementById('s-r').innerText) + 1;
            forceTimerStopLocally();
            socket.emit('double_hit');
            if(navigator.vibrate) navigator.vibrate(50);
        }
        function toggleTimerOptimistic() {
            const b = document.getElementById('btn-toggle');
            if (b.innerText === "AVVIO" || b.innerText === "RIPRENDI PAUSA") { b.innerText = "STOP"; b.className = "start-btn bg-stop"; } 
            else { b.innerText = "AVVIO"; b.className = "start-btn bg-start"; }
            socket.emit('toggle_timer');
            if(navigator.vibrate) navigator.vibrate(50);
        }
        function adjustTime(d) { socket.emit('adjust_time',{delta:d}); forceTimerStopLocally(); }
        function resetAction(a) { socket.emit(a); document.getElementById('reset-menu').removeAttribute('open'); forceTimerStopLocally(); }
        function undoAction() { socket.emit('undo'); document.getElementById('reset-menu').removeAttribute('open'); forceTimerStopLocally(); }

        function handleCardClick(s,c){
            let cc=c;
            if(pMode[s]){
                cc=`P_${c}`; pMode[s]=false; updatePButton(s);
                socket.emit('card_action',{side:s,card:cc}); forceTimerStopLocally();
                return;
            }
            let cardName = c === 'Y' ? "GIALLO" : c === 'R' ? "ROSSO" : "NERO";
            if (confirm("Assegnare cartellino " + cardName + " a " + (s==='left'?'SX':'DX') + "?")) {
                socket.emit('card_action',{side:s,card:cc});
                forceTimerStopLocally(); 
            }
        }

        socket.on('status_check', (s) => {
            const wf = document.getElementById('stat-wifi');
            const go = document.getElementById('stat-google');
            wf.className = 'icon-btn ' + (s.internet ? 'icon-ok' : 'icon-error');
            go.className = 'icon-btn ' + (s.google === 'ok' ? 'icon-ok' : 'icon-error');
        });

        socket.on('action_feedback', (data) => {
            if (data.status === 'error') alert("ERRORE: " + data.msg);
            else showToast(data.msg, data.status === 'info' ? 5000 : 3000);
        });

        socket.on('time_expired', () => { 
            playBeep();
            document.body.style.backgroundColor='#500'; 
            setTimeout(()=>document.body.style.backgroundColor='#050515',500); 
        });

        setInterval(()=>socket.emit('admin_heartbeat',{active:true}),2000);
        
        function changeGirone(g){
            currentGirone = g;
            document.getElementById('girone-label').innerText="Girone: "+g.charAt(0).toUpperCase()+g.slice(1);
            socket.emit('fetch_sheet', {girone: g});
            document.getElementById('girone-details').removeAttribute('open');
        }
        function triggerMatchLoad(){
            const sel = document.getElementById('sel');
            if(sel.value === "") return;
            if(confirm("Caricare l'assalto selezionato sul Display?")){
                let matchData = matches[sel.value];
                matchData.girone = currentGirone; 
                socket.emit('load_match', matchData);
                forceTimerStopLocally();
            }
        }
        function forceUpdate(){ socket.emit('fetch_sheet', {girone: currentGirone}); showToast("Aggiornamento Google..."); }
        function sendResult(){ if(confirm("Inviare punteggio a Google?")) socket.emit('send_result'); }
        
        function toggleP(s){pMode[s]=!pMode[s];updatePButton(s)}
        function updatePButton(s){
            const b=document.getElementById(`btn-${s[0]}-P`);
            if(pMode[s]){b.classList.add('bg-p-active');b.innerText="P (ON)"} else{b.classList.remove('bg-p-active');b.innerText="P"}
        }
        
        const updateTimeUI=(t,p)=>{
            const ts=`${Math.floor(t/60)}:${(Math.floor(t%60)<10?'0':'')+Math.floor(t%60)}`;
            const d=document.getElementById('timer-display');
            if(p==='BREAK'){d.innerText=`PAUSA (${ts})`;d.classList.add('timer-text-break')} else{d.innerText=`Modifica Tempo (${ts})`;d.classList.remove('timer-text-break')}
        };

        socket.on('timer_update',d=>updateTimeUI(d.time,d.phase));
        
        socket.on('state_update',s=>{
            if(s.settings) { globalSettings = s.settings; }
            document.getElementById('s-l').innerText=s.fencer_left.score;
            document.getElementById('s-r').innerText=s.fencer_right.score;
            updateTimeUI(s.timer,s.phase);
            const b=document.getElementById('btn-toggle');
            if(s.phase==='BREAK'){ b.innerText=s.running?"IN PAUSA":"RIPRENDI PAUSA"; b.className=s.running?"start-btn bg-pause":"start-btn bg-start"; } 
            else { b.innerText=s.running?"STOP":"AVVIO"; b.className=s.running?"start-btn bg-stop":"start-btn bg-start"; }
            const upC=(side,d)=>{
                const sc=side[0];
                ['Y','R','B'].forEach(c=>{let e=document.getElementById(`btn-${sc}-${c}`); if(e) e.classList.remove('active');});
                if(d.cards.Y){let e=document.getElementById(`btn-${sc}-Y`); if(e) e.classList.add('active');}
                if(d.cards.R){let e=document.getElementById(`btn-${sc}-R`); if(e) e.classList.add('active');}
                if(d.cards.B){let e=document.getElementById(`btn-${sc}-B`); if(e) e.classList.add('active');}
            };
            upC('left',s.fencer_left); upC('right',s.fencer_right);
            if (s.current_row_idx && matches.length > 0) {
                const idx = matches.findIndex(m => m.row === s.current_row_idx);
                const sel = document.getElementById('sel');
                if (idx !== -1 && sel.value != idx) sel.value = idx;
            }
        });
        
        socket.on('gironi_cache_update', (cache) => {
            matches = cache[currentGirone] || [];
            const sel = document.getElementById('sel');
            const currentVal = sel.value; 
            sel.innerHTML='<option value="">Seleziona Assalto...</option>';
            matches.forEach((m,i)=>{
                let o=document.createElement('option'); o.value=i; o.text=`${m.sx} (${m.p_sx}) - (${m.p_dx}) ${m.dx}`; sel.appendChild(o)
            });
            if(currentVal && currentVal < matches.length) sel.value = currentVal;
        });
    </script>
</body>
</html>

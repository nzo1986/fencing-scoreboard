<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telecomando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; touch-action: manipulation; user-select: none; font-family: sans-serif; }
        .border-custom { border: 1px solid #333; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        .name-transition { transition: color 0.1s, text-shadow 0.1s; }
        .p-mode-active { background: #4b5563 !important; border-color: #9ca3af !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-50 w-11/12 max-w-md pointer-events-none"></div>

    <!-- Top Bar -->
    <div class="bg-[#1f1f1f] py-3 text-center border-b border-[#333] cursor-pointer active:bg-[#222] flex-none" onclick="toggleMenu('menu-tempo')">
        <span class="text-white font-bold text-lg">Modifica Tempo (<span id="timer-display-top">3:00</span>) ▼</span>
    </div>

    <!-- Hidden Time Menu -->
    <div id="menu-tempo" class="hidden grid grid-cols-4 gap-2 bg-[#18181b] p-3 border-b border-[#333] shadow-inner flex-none">
        <button class="bg-[#27272a] text-green-400 py-3 rounded font-bold active:bg-[#444] border border-[#444] text-sm sm:text-base" onclick="socket.emit('adjust_time', {delta: 60})">+1 MIN</button>
        <button class="bg-[#27272a] text-red-400 py-3 rounded font-bold active:bg-[#444] border border-[#444] text-sm sm:text-base" onclick="socket.emit('adjust_time', {delta: -60})">-1 MIN</button>
        <button class="bg-[#27272a] text-green-400 py-3 rounded font-bold active:bg-[#444] border border-[#444] text-sm sm:text-base" onclick="socket.emit('adjust_time', {delta: 1})">+1 SEC</button>
        <button class="bg-[#27272a] text-red-400 py-3 rounded font-bold active:bg-[#444] border border-[#444] text-sm sm:text-base" onclick="socket.emit('adjust_time', {delta: -1})">-1 SEC</button>
    </div>

    <!-- +/- Row -->
    <div class="flex w-full bg-[#111] border-b border-[#333] flex-none">
        <button class="flex-1 py-4 text-red-500 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('update_score', {side:'left', delta:-1})">-</button>
        <button class="flex-1 py-4 text-green-500 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('update_score', {side:'left', delta:1})">+</button>
        <button class="flex-[2] py-4 text-gray-300 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('double_hit')">DOPPIO</button>
        <button class="flex-1 py-4 text-green-500 font-bold border-r border-[#333] active:bg-[#222]" onclick="socket.emit('update_score', {side:'right', delta:1})">+</button>
        <button class="flex-1 py-4 text-red-500 font-bold active:bg-[#222]" onclick="socket.emit('update_score', {side:'right', delta:-1})">-</button>
    </div>

    <!-- Scores -->
    <div class="flex w-full bg-[#050505] py-4 sm:py-6 flex-none">
        <div class="flex-1 text-center text-red-500 text-6xl font-bold" id="score-left">0</div>
        <div class="flex-1 text-center text-green-500 text-6xl font-bold" id="score-right">0</div>
    </div>

    <!-- AVVIO Button -->
    <div class="w-full px-2 pt-2 pb-1 flex-none">
        <!-- Cliccare AVVIO ora chiude anche tutti i menu aperti -->
        <button id="btn-avvio" class="w-full bg-[#16a34a] text-white text-4xl sm:text-5xl font-bold py-6 sm:py-8 rounded shadow-lg active:opacity-75 transition-colors" onclick="socket.emit('toggle_timer'); closeAllMenus();">AVVIO</button>
    </div>

    <!-- Nomi Atleti Attuali -->
    <div class="flex w-full px-2 pb-2 justify-between items-center flex-none">
        <div class="flex-1 text-center text-red-500 text-lg sm:text-xl font-bold truncate px-1 name-transition" id="name-left">ATLETA SX</div>
        <div class="text-gray-500 font-bold px-1">VS</div>
        <div class="flex-1 text-center text-green-500 text-lg sm:text-xl font-bold truncate px-1 name-transition" id="name-right">ATLETA DX</div>
    </div>

    <!-- Grid Controls (Zona centrale con scroll se lo schermo è piccolo) -->
    <div class="w-full px-2 pb-2 flex-1 flex flex-col gap-2 justify-start sm:justify-center overflow-y-auto">
        
        <!-- Row P / Priorità / INVIA / P -->
        <div class="flex gap-2 min-h-[50px]">
            <button id="btn-left-p" class="flex-1 bg-[#333] text-gray-300 font-bold py-3 sm:py-4 rounded border-custom active:opacity-70 transition-colors" onclick="togglePMode('left')">P</button>
            <button class="flex-[2] bg-[#1e3a8a] text-white font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="socket.emit('toggle_priority')">Priorità</button>
            <button class="flex-[2] bg-[#1d4ed8] text-white font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="socket.emit('send_result')">INVIA</button>
            <button id="btn-right-p" class="flex-1 bg-[#333] text-gray-300 font-bold py-3 sm:py-4 rounded border-custom active:opacity-70 transition-colors" onclick="togglePMode('right')">P</button>
        </div>

        <!-- Row G / Swipe / G -->
        <div class="flex gap-2 min-h-[50px]">
            <button id="btn-left-y" class="flex-1 bg-[#ca8a04] text-black font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="sendCard('left', 'Y')">G</button>
            <button class="flex-[4] bg-[#7f1d1d] text-white font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="socket.emit('swap_fencers')">Swipe Atleti &lt;--&gt;</button>
            <button id="btn-right-y" class="flex-1 bg-[#ca8a04] text-black font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="sendCard('right', 'Y')">G</button>
        </div>

        <!-- Row R / Menu Reset / R -->
        <div class="flex gap-2 min-h-[50px]">
            <button id="btn-left-r" class="flex-1 bg-[#dc2626] text-white font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="sendCard('left', 'R')">R</button>
            <button class="flex-[4] bg-[#27272a] text-white font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="toggleMenu('menu-reset')">Menu Reset</button>
            <button id="btn-right-r" class="flex-1 bg-[#dc2626] text-white font-bold py-3 sm:py-4 rounded border-custom active:opacity-70" onclick="sendCard('right', 'R')">R</button>
        </div>

        <!-- Hidden Reset Menu (Si chiude al click di un pulsante) -->
        <div id="menu-reset" class="hidden grid grid-cols-2 gap-2 bg-[#18181b] p-3 rounded border border-[#444] shadow-inner mb-1">
            <button class="bg-[#333] text-white py-3 rounded font-bold active:bg-[#555]" onclick="socket.emit('reset_scores'); closeAllMenus();">Azzera Punti</button>
            <button class="bg-[#333] text-white py-3 rounded font-bold active:bg-[#555]" onclick="socket.emit('reset_timer'); closeAllMenus();">Azzera Tempo</button>
            <button class="bg-[#222] text-white py-3 rounded font-bold col-span-2 border border-[#444] active:bg-[#444]" onclick="socket.emit('reset_all'); closeAllMenus();">Reset Totale</button>
            <button class="bg-[#3f1f1f] text-red-300 py-3 rounded font-bold text-sm border border-[#5c2b2b] active:bg-[#5c2b2b]" onclick="socket.emit('reset_cards', {side:'left'}); closeAllMenus();">Reset Cart. SX</button>
            <button class="bg-[#1b3b22] text-green-300 py-3 rounded font-bold text-sm border border-[#2b5c35] active:bg-[#2b5c35]" onclick="socket.emit('reset_cards', {side:'right'}); closeAllMenus();">Reset Cart. DX</button>
        </div>

        <!-- Row N / Girone / N -->
        <div class="flex gap-2 min-h-[50px]">
            <button id="btn-left-b" class="flex-1 bg-[#000] text-white font-bold py-3 sm:py-4 rounded border-custom active:bg-[#222]" onclick="sendCard('left', 'B')">N</button>
            
            <!-- Menu a tendina per scelta Girone -->
            <select id="girone-select" class="flex-[4] bg-[#27272a] text-white font-bold py-3 sm:py-4 rounded border-custom outline-none text-center text-base sm:text-lg" onchange="changeGirone()">
                <option value="rosso">Girone: Rosso</option>
                <option value="giallo">Girone: Giallo</option>
                <option value="blu">Girone: Blu</option>
                <option value="verde">Girone: Verde</option>
                <option value="32">Tabellone: 32</option>
            </select>
            
            <button id="btn-right-b" class="flex-1 bg-[#000] text-white font-bold py-3 sm:py-4 rounded border-custom active:bg-[#222]" onclick="sendCard('right', 'B')">N</button>
        </div>

        <!-- Row Select / AGG -->
        <div class="flex gap-2 min-h-[50px]">
            <select id="match-select" class="flex-[4] bg-[#18181b] text-white border-custom rounded px-3 py-3 sm:py-4 outline-none text-center font-bold text-base sm:text-lg" onchange="loadSelectedMatch()">
                <option value="" style="color: white;">Seleziona Assalto...</option>
            </select>
            <button class="flex-[1] bg-[#15803d] text-white font-bold py-3 sm:py-4 rounded border border-[#166534] active:opacity-70" onclick="socket.emit('fetch_sheet')">AGG.</button>
        </div>

    </div>

    <!-- Bottom Nav Bar con pulsanti espliciti (sempre visibili a fine schermo) -->
    <div class="flex gap-2 p-3 bg-[#111] border-t border-[#333] mt-auto flex-none">
        <button class="flex-[2] bg-indigo-700 text-white font-bold py-3 text-sm rounded shadow active:bg-indigo-600" onclick="window.location.href='/inserisci_punti'">📝 Altri Gironi</button>
        <button class="flex-1 bg-gray-700 text-white font-bold py-3 text-sm rounded shadow active:bg-gray-600" onclick="window.location.href='/settings'">⚙️ Impost.</button>
    </div>

    <script>
        const socket = io();
        let allGironi = {};
        let priorityAnimTimer = null;
        
        // Aggiunta gestione audio telecomando
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Sblocca l'audio al primo tocco
        document.body.addEventListener('click', () => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }, {once: true});

        function playBeep(hz, duration) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(); 
            const g = audioCtx.createGain();
            o.type = 'square'; 
            o.frequency.setValueAtTime(hz, audioCtx.currentTime); 
            g.gain.setValueAtTime(1.0, audioCtx.currentTime);
            o.connect(g); 
            g.connect(audioCtx.destination);
            o.start(); 
            o.stop(audioCtx.currentTime + duration); 
        }

        socket.on('time_expired', () => {
            playBeep(500, 1.0); // Suono quando scade il tempo
        });
        
        // Funzioni Gestione Menu a comparsa
        function closeAllMenus(except = null) {
            if (except !== 'menu-tempo') document.getElementById('menu-tempo').classList.add('hidden');
            if (except !== 'menu-reset') document.getElementById('menu-reset').classList.add('hidden');
        }

        function toggleMenu(menuId) {
            const menu = document.getElementById(menuId);
            const isHidden = menu.classList.contains('hidden');
            closeAllMenus(); // Chiudi gli altri prima di aprire questo
            if (isHidden) {
                menu.classList.remove('hidden');
            }
        }

        // Gestione Logica Cartellini "P"
        let pMode = { left: false, right: false };

        function togglePMode(side) {
            pMode[side] = !pMode[side];
            const pBtn = document.getElementById(`btn-${side}-p`);
            if (pMode[side]) {
                pBtn.classList.add('p-mode-active');
            } else {
                pBtn.classList.remove('p-mode-active');
            }
            
            document.getElementById(`btn-${side}-y`).innerText = pMode[side] ? "P-G" : "G";
            document.getElementById(`btn-${side}-r`).innerText = pMode[side] ? "P-R" : "R";
            document.getElementById(`btn-${side}-b`).innerText = pMode[side] ? "P-N" : "N";
        }

        function sendCard(side, baseCardType) {
            if (pMode[side]) {
                socket.emit('card_action', {side: side, card: 'P_' + baseCardType});
                togglePMode(side); // Torna alla normalità dopo l'invio
            } else {
                socket.emit('card_action', {side: side, card: baseCardType});
            }
        }

        // Notifiche Toast
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgColor = 'bg-blue-600';
            let borderColor = 'border-blue-400';
            if (type === 'error') { bgColor = 'bg-red-600'; borderColor = 'border-red-400'; }
            if (type === 'success') { bgColor = 'bg-green-600'; borderColor = 'border-green-400'; }

            toast.className = `${bgColor} border ${borderColor} text-white px-4 py-3 rounded-lg shadow-xl font-bold text-center text-sm transition-opacity duration-300 opacity-0 pointer-events-auto`;
            toast.innerText = msg;

            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('opacity-0'), 10);
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 1000); 
        }

        socket.on('action_feedback', d => {
            showToast(d.msg, d.status);
        });

        // Sincronizza i dati all'avvio
        socket.on('connect', () => {
            socket.emit('fetch_sheet');
        });

        // Aggiorna passivamente ogni 40s
        setInterval(() => { socket.emit('fetch_sheet'); }, 40000);

        function promptTime() {
            const t = prompt("Aggiungi o togli secondi dal tempo attuale (es. 10 o -10):", "0");
            if(t && !isNaN(t)) { socket.emit('adjust_time', {delta: parseInt(t)}); }
        }

        // Cambia semplicemente i dati nella tendina senza forzare chiamate esterne (legge la cache allGironi)
        function changeGirone() {
            updateMatchDropdown();
        }

        function updateMatchDropdown() {
            const g = document.getElementById('girone-select').value;
            const matches = allGironi[g] || [];
            const sel = document.getElementById('match-select');
            
            sel.innerHTML = '<option value="" style="color: white;">Seleziona Assalto...</option>';
            matches.forEach(m => {
                if(m.sx && m.dx && m.sx.trim() !== '' && m.dx.trim() !== '') {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify({girone: g, row: m.row, sx: m.sx, dx: m.dx, p_sx: m.p_sx, p_dx: m.p_dx});
                    
                    const p_sx_val = parseInt(m.p_sx) || 0;
                    const p_dx_val = parseInt(m.p_dx) || 0;
                    
                    // Condizione per colorare e inserire indicatore visivo
                    if (p_sx_val !== 0 || p_dx_val !== 0) { 
                        opt.style.color = '#ef4444'; // Rosso (funziona su Desktop/Alcuni Mobile)
                        opt.innerText = `🔴 ${m.sx} [${p_sx_val}] - [${p_dx_val}] ${m.dx}`;
                    } else {
                        opt.style.color = '#22c55e'; // Verde (funziona su Desktop/Alcuni Mobile)
                        opt.innerText = `🟢 ${m.sx} [${p_sx_val}] - [${p_dx_val}] ${m.dx}`;
                    }
                    
                    sel.appendChild(opt);
                }
            });
        }

        function loadSelectedMatch() {
            const val = document.getElementById('match-select').value;
            if(val) {
                const data = JSON.parse(val);
                socket.emit('load_match', data);
                document.getElementById('match-select').value = "";
                closeAllMenus(); // Chiude tutto se era aperto
            }
        }

        socket.on('gironi_cache_update', cache => {
            allGironi = cache;
            updateMatchDropdown();
        });

        socket.on('timer_update', d => {
            const display = document.getElementById('timer-display-top');
            if (d.time > 10) {
                let m = Math.floor(d.time/60);
                let s = Math.floor(d.time%60);
                let sStr = (s < 10 ? '0' : '') + s;
                if (d.phase === 'PRIORITY_MINUTE') {
                    display.innerHTML = `${m}<span class="text-red-500">:</span>${sStr}`;
                } else {
                    display.innerHTML = `${m}:${sStr}`;
                }
            } else {
                display.innerText = d.time.toFixed(1);
            }
        });

        socket.on('priority_animation', data => {
            let duration = data.duration;
            let startTime = Date.now();
            let isLeft = true;
            let delay = 250;

            if(priorityAnimTimer) clearTimeout(priorityAnimTimer);

            function flash() {
                let now = Date.now();
                if (now - startTime > duration) return;

                document.getElementById('name-left').style.color = isLeft ? '#ffffff' : '#ef4444';
                document.getElementById('name-right').style.color = !isLeft ? '#ffffff' : '#22c55e';

                isLeft = !isLeft;
                delay = Math.max(40, delay * 0.85);
                priorityAnimTimer = setTimeout(flash, delay);
            }
            flash();
        });

        socket.on('state_update', s => {
            document.getElementById('score-left').innerText = s.fencer_left.score;
            document.getElementById('score-right').innerText = s.fencer_right.score;

            document.getElementById('name-left').innerText = s.fencer_left.name || "ATLETA SX";
            document.getElementById('name-right').innerText = s.fencer_right.name || "ATLETA DX";

            if (s.priority === 'left') {
                document.getElementById('name-left').style.color = '#ffffff';
                document.getElementById('name-left').style.textShadow = '0 0 10px #ffffff';
                document.getElementById('name-right').style.color = '#22c55e';
                document.getElementById('name-right').style.textShadow = 'none';
            } else if (s.priority === 'right') {
                document.getElementById('name-left').style.color = '#ef4444';
                document.getElementById('name-left').style.textShadow = 'none';
                document.getElementById('name-right').style.color = '#ffffff';
                document.getElementById('name-right').style.textShadow = '0 0 10px #ffffff';
            } else {
                document.getElementById('name-left').style.color = '#ef4444';
                document.getElementById('name-left').style.textShadow = 'none';
                document.getElementById('name-right').style.color = '#22c55e';
                document.getElementById('name-right').style.textShadow = 'none';
            }

            const btnAvvio = document.getElementById('btn-avvio');
            if(s.running) {
                btnAvvio.innerText = "ALT";
                btnAvvio.classList.remove('bg-[#16a34a]');
                btnAvvio.classList.add('bg-[#dc2626]');
            } else {
                btnAvvio.innerText = "AVVIO";
                btnAvvio.classList.remove('bg-[#dc2626]');
                btnAvvio.classList.add('bg-[#16a34a]');
            }

            if (s.active_girone) {
                const gironeSelect = document.getElementById('girone-select');
                if (gironeSelect && gironeSelect.value !== s.active_girone) {
                    gironeSelect.value = s.active_girone;
                    updateMatchDropdown();
                }
            }
        });
    </script>
</body>
</html>
